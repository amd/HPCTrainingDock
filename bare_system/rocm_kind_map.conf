# Registry mapping a ROCm SUFFIX (the part after the PrgEnv version in a
# --program-environments token) to a CANONICAL run_rocm_build_sweep token.
#
# The high-level --program-environments interface of run_rocm_build_sweep.sh
# accepts tokens of the form:
#
#     <flavor>/<pe>-<rocm-suffix>
#
# e.g. PrgEnv-amd-new/8.7.0-7.2.3, PrgEnv-cray-new/8.7.0-7.12.0,
#      PrgEnv-amd-new/8.7.0-afar-23.2.1
#
# The <rocm-suffix> (7.2.3, 7.13.0, afar-23.2.1, ...) mostly resolves to
# itself: this file only needs entries for suffixes whose canonical token
# DIFFERS from the suffix (e.g. an alias). Routing of a bare numeric to
# docker-build vs TheRock-tarball is decided by a VERSION THRESHOLD, not by
# this file:
#   * bare numeric  < 7.10.0  -> full docker build via run_rocm_build.sh
#                                (install rocm-<numeric>, module rocm/<numeric>)
#   * bare numeric >= 7.10.0  -> pre-built TheRock tarball via
#                                run_rocm_therock_install.sh, installed with the
#                                SAME numeric naming (rocm-<numeric>,
#                                rocm/<numeric>, rocmplus-<numeric>). The only
#                                difference from a docker release is the source
#                                (repo.amd.com tarball) and packaging.
# See _is_therock_numeric() / classify_kind() in run_rocm_build_sweep.sh and
# run_rocm_build_sweep.sbatch. afar-23.2.1 is a TheRock-AFAR drop (kept prefixed).
#
# Format:
#   <rocm-suffix>=<canonical-sweep-token>
# where <canonical-sweep-token> is one of:
#   * a bare numeric (X.Y.Z)        -> docker build (< 7.10.0) OR TheRock
#                                      tarball (>= 7.10.0); decided by threshold
#   * therock-afar-X.Y.Z            -> run_rocm_therock_afar_install.sh
#   * afar-X.Y.Z                    -> run_rocm_afar_install.sh
# Lines beginning with '#' and blank lines are ignored.
#
# Consumed by:
#   bare_system/run_rocm_build_sweep.sh -- when --program-environments is used,
#       resolves each PrgEnv token's rocm-suffix to its canonical token.
#   bare_system/run_rocm_build_sweep.sbatch -- the compute-node re-parse uses the
#       same resolution so it agrees with the submitter.
#
# Generic afar auto-resolution (NO entry required):
#   A suffix of the form  afar-<REL>  or  afar-<REL>-<NUMERIC>
#   (e.g. afar-23.2.1 or afar-23.2.1-7.13.0) auto-resolves to the canonical
#   TheRock-AFAR token  therock-afar-<REL>  (direct tarball download from the
#   radeon flang/ site -- no cache, no docker build). <REL> is the AFAR/LLVM
#   compiler release; the optional trailing -<NUMERIC> is INFORMATIONAL only:
#   it mirrors the tarball's .info/version (the ROCm SDK version, e.g. 7.13.0),
#   which the installer derives on its own, so it is stripped during resolution.
#   These afar-* suffixes therefore do NOT need a line below.
#
# A bare numeric suffix (X.Y[.Z]) that is NOT listed here resolves to itself
# (identity); the >= 7.10.0 threshold then picks TheRock-tarball vs docker.
# So numeric TheRock releases (7.12.0, 7.13.0, ...) need NO entry. Add an entry
# below only to alias a suffix to a DIFFERENT canonical token. An explicit
# entry always wins over the identity + generic-afar rules.

# afar-* suffixes are auto-resolved (see the generic rule above); no entry
# needed. Example: afar-23.2.1-7.13.0 -> therock-afar-23.2.1.
