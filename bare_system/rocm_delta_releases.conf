# Registry of AMD ROCm delta releases.
#
# A "delta release" is a ROCm point release where AMD's apt/dnf meta-packages
# resolve to only a small subset of leaf packages (typically 4-10) because the
# release is intended to overlay an existing base install rather than stand
# alone. The canonical example is ROCm 7.2.2, which ships only rocm-llvm /
# rocm-core / rocm-device-libs as version-tagged packages even though the
# repository contains the full ~200-package stack.
#
# See: https://github.com/ROCm/ROCm/releases/tag/rocm-7.2.2
#      "ROCm 7.2.2 doesn't include any other significant changes... For
#       comprehensive changes... refer to the ROCm 7.2.1 release notes"
#
# Format:
#   <delta-version>=<base-version>
# where <delta-version> is the new release name and <base-version> is the
# prior full release whose runtime stack the delta is layered on top of.
# Lines beginning with '#' and blank lines are ignored.
#
# Consumed by:
#   bare_system/run_rocm_build_sweep.sh  -- passes --base-rocm-version + --supersedes
#                                           to run_rocm_build.sh when a sweep version
#                                           is listed here
#   rocm/scripts/rocm_setup.sh           -- detect_release_type() reads this first;
#                                           skips apt resolver query for cached entries
#
# To add a new entry: when the build log emits
#     [rocm_setup] NOTICE: ROCm <V> appears to be a delta release...
#     [rocm_setup] To cache: add to bare_system/rocm_delta_releases.conf:
#         <V>=<BASE>
# copy that line into this file and commit. Future builds will skip detection.

7.2.2=7.2.1
